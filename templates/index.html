<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛍️ Black Friday Sales Predictor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛍️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>
<body>
  <div class="container">
    <div class="card">
      <header class="header">
        <h1>🛍️ Black Friday Sales Predictor</h1>
        <p class="subtitle">Predict how much a customer will spend this Black Friday</p>
      </header>

      <form class="form" action="/result" method="POST">

        <div class="section">
          <h2 class="section-title">👤 Customer Info</h2>
          <div class="grid">
            <div class="field">
              <label for="User_ID">User ID</label>
              <input type="text" id="User_ID" name="User_ID" value="1000001" required>
            </div>
            <div class="field">
              <label for="Gender">Gender</label>
              <select id="Gender" name="Gender">
                <option value="F">Female</option>
                <option value="M" selected>Male</option>
              </select>
            </div>
            <div class="field">
              <label for="Age">Age Range</label>
              <select id="Age" name="Age">
                <option value="0-17">0-17</option>
                <option value="18-25">18-25</option>
                <option value="26-35" selected>26-35</option>
                <option value="36-45">36-45</option>
                <option value="46-50">46-50</option>
                <option value="51-55">51-55</option>
                <option value="55+">55+</option>
              </select>
            </div>
            <div class="field">
              <label for="Marital_Status">Marital Status</label>
              <select id="Marital_Status" name="Marital_Status">
                <option value="0" selected>Single</option>
                <option value="1">Married</option>
              </select>
            </div>
            <div class="field">
              <label for="Occupation">Occupation Code</label>
              <select id="Occupation" name="Occupation">
                <option value="0">0</option><option value="1">1</option>
                <option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option>
                <option value="6">6</option><option value="7">7</option>
                <option value="8">8</option><option value="9">9</option>
                <option value="10" selected>10</option><option value="11">11</option>
                <option value="12">12</option><option value="13">13</option>
                <option value="14">14</option><option value="15">15</option>
                <option value="16">16</option><option value="17">17</option>
                <option value="18">18</option><option value="19">19</option>
                <option value="20">20</option>
              </select>
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">🏙️ Location</h2>
          <div class="grid">
            <div class="field">
              <label for="City_Category">City Category</label>
              <select id="City_Category" name="City_Category">
                <option value="A" selected>A (Urban)</option>
                <option value="B">B (Semi-urban)</option>
                <option value="C">C (Rural)</option>
              </select>
            </div>
            <div class="field">
              <label for="Stay_In_Current_City_Years">Years in Current City</label>
              <select id="Stay_In_Current_City_Years" name="Stay_In_Current_City_Years">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2" selected>2</option>
                <option value="3">3</option>
                <option value="4+">4+</option>
              </select>
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">🛒 Product Info</h2>
          <div class="grid">
            <div class="field">
              <label for="Product_ID">Product ID</label>
              <input type="text" id="Product_ID" name="Product_ID" value="P00069042" required>
            </div>
            <div class="field">
              <label for="Product_Category_1">Product Category 1</label>
              <select id="Product_Category_1" name="Product_Category_1">
                <option value="1">1</option><option value="2">2</option>
                <option value="3" selected>3</option><option value="4">4</option>
                <option value="5">5</option><option value="6">6</option>
                <option value="7">7</option><option value="8">8</option>
                <option value="9">9</option><option value="10">10</option>
                <option value="11">11</option><option value="12">12</option>
                <option value="13">13</option><option value="14">14</option>
                <option value="15">15</option><option value="16">16</option>
                <option value="17">17</option><option value="18">18</option>
              </select>
            </div>
            <div class="field">
              <label for="Product_Category_2">Product Category 2</label>
              <select id="Product_Category_2" name="Product_Category_2">
                <option value="1">1</option><option value="2">2</option>
                <option value="3">3</option><option value="4" selected>4</option>
                <option value="5">5</option><option value="6">6</option>
                <option value="7">7</option><option value="8">8</option>
                <option value="9">9</option><option value="10">10</option>
                <option value="11">11</option><option value="12">12</option>
                <option value="13">13</option><option value="14">14</option>
                <option value="15">15</option><option value="16">16</option>
                <option value="17">17</option><option value="18">18</option>
              </select>
            </div>
            <div class="field">
              <label for="Product_Category_3">Product Category 3</label>
              <select id="Product_Category_3" name="Product_Category_3">
                <option value="3">3</option><option value="4">4</option>
                <option value="5">5</option><option value="6">6</option>
                <option value="8">8</option><option value="9">9</option>
                <option value="10">10</option><option value="11">11</option>
                <option value="12" selected>12</option><option value="13">13</option>
                <option value="14">14</option><option value="15">15</option>
                <option value="16">16</option><option value="17">17</option>
                <option value="18">18</option>
              </select>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-predict">✨ Predict Purchase Value</button>
      </form>

      {% if prediction %}
      <div class="result-box" id="resultBox">
        <p class="result-label">Predicted Purchase Value</p>
        <p class="result-value" id="resultValue" data-value="{{ prediction }}">$0.00</p>
        <p class="result-tier" id="resultTier"></p>
      </div>
      <script>
        (function() {
          const target = parseFloat(document.getElementById('resultValue').dataset.value);
          const el = document.getElementById('resultValue');
          const tierEl = document.getElementById('resultTier');

          let tier = '';
          if (target >= 15000) tier = '💎 Premium Spender';
          else if (target >= 10000) tier = '💰 High Spender';
          else if (target >= 5000) tier = '🛒 Average Shopper';
          else tier = '🪙 Budget Buyer';
          tierEl.textContent = tier;

          const duration = 1200;
          const start = performance.now();
          function tick(now) {
            const p = Math.min((now - start) / duration, 1);
            const eased = 1 - Math.pow(1 - p, 3);
            const value = target * eased;
            el.textContent = '$' + value.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            if (p < 1) requestAnimationFrame(tick);
          }
          requestAnimationFrame(tick);
        })();
      </script>
      {% endif %}

      <footer class="footer">Built with Flask + CatBoost 🚀</footer>
    </div>
  </div>
</body>
</html>
